<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ET Office Sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- แถบหุบ (M4-3) — เห็นเฉพาะตอน collapsed -->
<div id="strip" onclick="toggleSidebar()" title="เปิด ET Office">
  <span id="strip-dot" class="dot off"></span>
  <span class="strip-text">ET OFFICE</span>
  <span class="strip-arrow">«</span>
</div>

<div id="panel">
  <header>
    <div class="brand">
      <span id="daemon-dot" class="dot off" title="daemon status"></span>
      <h1>ET OFFICE</h1>
    </div>
    <button class="ghost" onclick="toggleSidebar()" title="หุบ">»</button>
  </header>

  <!-- Agent list (M4-4) -->
  <section id="agents-panel">
    <div class="section-head">
      <h2>AGENTS</h2>
      <button class="neon-btn" onclick="openHire()">+ HIRE</button>
    </div>
    <div id="agent-list"></div>
  </section>

  <!-- Terminal (M4-5) -->
  <section id="terminal-panel">
    <div class="section-head"><h2>TERMINAL</h2></div>
    <div id="feed"></div>
    <form id="task-form" onsubmit="submitTask(); return false;">
      <input id="task-input" type="text" placeholder="สั่งงานทีม… (Enter เพื่อส่ง)"
             autocomplete="off">
      <button type="submit" class="neon-btn">SEND</button>
    </form>
  </section>

  <!-- Proposals (M4-7) -->
  <section id="proposals-panel">
    <div class="section-head">
      <h2>PROPOSALS</h2>
      <span id="prop-count" class="count-badge hidden"></span>
    </div>
    <div id="proposal-list"><div class="empty-note">ยังไม่มีข้อเสนอจากทีม</div></div>
  </section>

  <!-- Settings (M4-6) -->
  <section id="settings-panel">
    <div class="section-head">
      <h2>SETTINGS</h2>
      <button class="ghost" onclick="toggleSettings()" id="settings-arrow">▸</button>
    </div>
    <div id="settings-body" class="hidden">
      <div class="set-row" id="vram-info">VRAM: …</div>

      <h3>ATMOSPHERE — wallpaper mood (M4-10)</h3>
      <div class="set-row" id="atmo-row">
        <button class="neon-btn atmo on" data-mode="auto" onclick="setAtmosphere('auto')">AUTO</button>
        <button class="neon-btn atmo" data-mode="dawn" onclick="setAtmosphere('dawn')">🌅</button>
        <button class="neon-btn atmo" data-mode="day" onclick="setAtmosphere('day')">☀️</button>
        <button class="neon-btn atmo" data-mode="golden" onclick="setAtmosphere('golden')">🌆</button>
        <button class="neon-btn atmo" data-mode="night" onclick="setAtmosphere('night')">🌙</button>
      </div>

      <h3>API KEYS — cloud (optional)</h3>
      <div class="set-row key-row">
        <select id="key-provider">
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="openai">OpenAI</option>
        </select>
        <input id="key-value" type="password" placeholder="วาง API key…" autocomplete="off">
        <button class="neon-btn" onclick="saveKey()">SAVE</button>
      </div>
      <div id="key-status" class="set-row"></div>

      <h3>SOCIAL LOOP</h3>
      <div class="set-row">
        <label class="inline"><input type="checkbox" id="soc-enabled"> เปิด agent คุยกันเอง</label>
      </div>
      <div class="set-row">
        <label class="inline">โอกาสคุย <input id="soc-chance" type="number" min="0" max="1" step="0.05" class="num"></label>
        <label class="inline">cooldown ข้อเสนอ (นาที) <input id="soc-cooldown" type="number" min="0" step="5" class="num"></label>
        <button class="neon-btn" onclick="saveSocial()">SAVE</button>
      </div>
    </div>
  </section>
</div>

<!-- Hire modal (M4-4) -->
<div id="hire-backdrop" class="hidden" onclick="closeHire(event)">
  <div id="hire-modal">
    <h2>HIRE AGENT</h2>
    <label>ชื่อ <input id="h-name" placeholder="ET Writer"></label>
    <label>Role <input id="h-role" placeholder="Content Writer"></label>
    <label>Keywords (คั่นด้วย ,) <input id="h-keywords" placeholder="เขียน, บทความ, สคริปต์"></label>
    <label>Avatar <input id="h-avatar" value="🤖" maxlength="4"></label>
    <label>สี aura
      <select id="h-color">
        <option value="#e040fb">Magenta</option>
        <option value="#00e5ff">Cyan</option>
        <option value="#ff4da6">Pink</option>
        <option value="#00ff9f">Green</option>
        <option value="#ffe040">Gold</option>
        <option value="#ff6030">Orange</option>
      </select>
    </label>
    <div class="modal-actions">
      <button class="ghost" onclick="closeHire()">ยกเลิก</button>
      <button class="neon-btn" onclick="hireAgent()">HIRE</button>
    </div>
  </div>
</div>

<!-- Model picker modal (M4-6) — per-agent LOCAL/CLOUD -->
<div id="model-backdrop" class="hidden" onclick="closeModelPicker(event)">
  <div id="model-modal">
    <h2>MODEL — <span id="m-agent-name"></span></h2>
    <label>Provider
      <select id="m-provider" onchange="onProviderChange()">
        <option value="ollama">🤖 LOCAL — Ollama</option>
        <option value="claude">☁ Claude</option>
        <option value="gemini">☁ Gemini</option>
        <option value="openai">☁ OpenAI</option>
      </select>
    </label>
    <label>Model <input id="m-model" placeholder="qwen3:8b"></label>
    <div id="m-key-warn" class="warn-note hidden">⚠ provider นี้ยังไม่ได้ตั้ง API key — ไปที่ SETTINGS ก่อน</div>
    <div class="modal-actions">
      <button class="ghost" onclick="closeModelPicker()">ยกเลิก</button>
      <button class="neon-btn" onclick="saveModel()">SAVE</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
