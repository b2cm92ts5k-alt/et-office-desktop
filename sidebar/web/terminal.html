<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ET Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body class="terminal">

<!-- หัวหน้าต่าง = drag region ของ pywebview (ลากย้ายได้ทั้งแถบ) -->
<div id="term-header" class="pywebview-drag-region">
  <span id="daemon-dot" class="dot off pywebview-drag-region"></span>
  <h1 class="pywebview-drag-region">ET TERMINAL</h1>
  <button class="ghost" onclick="collapseAll()" title="หุบทั้งหมด (กลับมาที่เดิม)">»</button>
</div>

<div id="feed"></div>

<!-- ไฟล์ที่ลากใส่ (M9-2) — แนบเข้า context ของ task ถัดไป -->
<div id="attached" class="attached hidden"></div>

<!-- overlay ตอนลากไฟล์เข้ามา -->
<div id="drop-hint">วางไฟล์ที่นี่เพื่อให้ทีมดู 📎</div>

<!-- เลือกผู้รับ + โหมด คุยเล่น/สั่งงาน (M13-7) -->
<div id="term-controls">
  <select id="target-agent" title="เลือกผู้รับ">
    <option value="">อัตโนมัติ (routing)</option>
  </select>
  <button type="button" id="mode-btn" class="neon-btn" onclick="toggleMode()" title="สลับโหมด คุยเล่น / สั่งงาน">⚙ สั่งงาน</button>
  <button type="button" id="team-btn" class="neon-btn" onclick="toggleTeam()" title="ทีม (แตกงานหลายคน) / เดี่ยว (1 คนทำ เหมาะงานเล็ก)">👥 ทีม</button>
</div>

<form id="task-form" onsubmit="submitTask(); return false;">
  <button type="button" class="neon-btn" id="attach-btn" onclick="pickFiles()" title="แนบไฟล์ให้ทีมดู">📎</button>
  <input id="task-input" type="text" placeholder="สั่งงานทีม… (Enter เพื่อส่ง)" autocomplete="off">
  <button type="submit" class="neon-btn">SEND</button>
</form>
<input id="file-input" type="file" multiple class="hidden" onchange="filesPicked(this)">

<!-- มุมจับปรับขนาด — frameless window ไม่มีขอบ resize ของ OS -->
<div id="grip" title="ลากเพื่อปรับขนาด">◢</div>

<script src="terminal.js?v=3"></script>
</body>
</html>
